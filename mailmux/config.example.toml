# Mailmux example configuration
# Copy this file to config.toml and edit to suit your environment.
# Values wrapped in ${VAR} are substituted from environment variables.

[general]
# Directory where raw .eml message files are stored
data_dir = "/var/lib/mailmux"

# Logging: trace | debug | info | warn | error
log_level = "info"

# Log output format: json | pretty
log_format = "json"

# Seconds to wait for in-flight work before forced shutdown
shutdown_grace_period_secs = 10

# Automatically delete processed events older than this many days
event_retention_days = 30

# HTTP port for /health, /ready, and /metrics endpoints (omit to disable)
health_port = 8080

[database]
url = "postgres://mailmux:${DB_PASSWORD}@localhost:5432/mailmux"
max_connections = 10

# ---------------------------------------------------------------------------
# IMAP accounts — add one [[accounts]] block per mailbox you want to monitor.
# ---------------------------------------------------------------------------

[[accounts]]
id = "personal"
enabled = true
imap_host = "imap.gmail.com"
imap_port = 993
tls = true
username = "user@gmail.com"
password = "${GMAIL_APP_PASSWORD}"
poll_interval_secs = 60
rate_limit_per_second = 5
max_connections = 2
mailboxes = ["INBOX"]

# Limit how far back the very first sync goes (optional)
initial_sync_max_messages = 1000
# initial_sync_start_date = "2024-01-01"

# Timeout in seconds for individual IMAP command exchanges (greeting, login,
# select, fetch inactivity, etc.). Default: 60
# imap_command_timeout_secs = 60

# Path to a PEM file containing additional CA certificate(s) to trust.
# Use this for local mail bridges that present a self-signed certificate,
# e.g. Proton Mail Bridge exports a cert.pem from its settings screen.
# Requires tls = true.
# tls_ca_file = "/home/user/.config/protonmail/bridge/cert.pem"

# Disable TLS certificate verification entirely.
# Only for local bridges on loopback interfaces where MITM is not a risk.
# Requires tls = true.
# tls_accept_invalid_certs = false

# [[accounts]]
# id = "work"
# enabled = false
# imap_host = "outlook.office365.com"
