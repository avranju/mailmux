# ---------------------------------------------------------------------------
# Processors — define pipelines that run when events occur.
# ---------------------------------------------------------------------------

# Built-in: logs every event via tracing (useful for debugging)
[[processors]]
name = "logger"
enabled = true
events = ["email_arrived"]
timeout_secs = 5
concurrency = 1

